# Suite Manifest — Agent General Staff public edition
#
# Schema version: 2.0-skill
#
# Full-blood public governance runtime.  Includes task-card validation,
# compilation, execution policy resolution, gate check, protocol drift
# checking, suite health diagnostics, bootstrap, project discovery,
# session preflight, scoped verification, runner, receipt/compliance,
# skill governance, capability registry, memory capsule, and stop-hook
# archive.
#
# Third-party skills are optional and NEVER auto-installed.
# Use `ags skill install --skill <name> --confirm` to install.
# See docs/skill-recommendations.md for recommendations.

schema_version: "2.0-skill"
suite:
  name: "agent-general-staff"
  version: "2.7.0-public"
  description: >
    Agent General Staff 2.7.0 public edition — Rust-native governance
    kernel and CLI for multi-agent engineering workflows. All core governance
    capabilities included. Optional third-party development skills available
    for confirmed install only.
  required: []
  optional:
    # auto-brainstorm / auto-debug / auto-verify are RETIRED (2.7): no longer
    # auto-triggered. Brainstorm demand routes to grill-with-docs, debug to
    # diagnose, and verification to the superpowers verification-before-completion
    # entrypoint. See manifests/skills-registry.yaml (route_state: retired).
    # ── Manual skills ──
    - name: tdd
      source: "https://github.com/anthropics/skills/tree/main/tdd"
      version: "latest"
      description: "Test-driven development workflow"
    - name: diagnose
      source: "https://github.com/anthropics/skills/tree/main/diagnose"
      version: "latest"
      description: "Root cause diagnosis with evidence chain"
    - name: grill-with-docs
      source: "https://github.com/anthropics/skills/tree/main/grill-with-docs"
      version: "latest"
      description: "Requirements alignment grounded in project docs"
    - name: prototype
      source: "https://github.com/anthropics/skills/tree/main/prototype"
      version: "latest"
      description: "Throwaway prototype workflow for uncertain designs"
    - name: superpowers
      source: "https://github.com/anthropics/skills/tree/main/superpowers"
      version: "latest"
      description: "Bundled engineering playbook dependency"
    - name: webapp-testing
      source: "https://github.com/anthropics/skills/tree/main/webapp-testing"
      version: "latest"
      description: "Playwright-based web application testing"
    - name: caveman-review
      source: "https://github.com/anthropics/skills/tree/main/caveman-review"
      version: "latest"
      description: "Short actionable code review feedback"
    - name: caveman-commit
      source: "https://github.com/anthropics/skills/tree/main/caveman-commit"
      version: "latest"
      description: "Concise Conventional Commit message generation"
  personal: {}
