# Suite Manifest — Agent General Staff public edition
#
# Schema version: 2.0-skill
#
# Full-blood public governance runtime.  Includes task-card validation,
# compilation, execution policy resolution, gate check, protocol drift
# checking, suite health diagnostics, bootstrap, project discovery,
# session preflight, scoped verification, runner, receipt/compliance,
# skill governance, capability registry, memory capsule, and stop-hook
# archive.
#
# Third-party skills are optional and NEVER auto-installed by AGS.
# See docs/skill-recommendations.md for the public recommendation list and
# manual install steps. Inspect governance status with `ags skill inventory`.

schema_version: "2.0-skill"
suite:
  name: "agent-general-staff"
  version: "0.2.7-public"
  description: >
    Agent General Staff 0.2.7 public edition — Rust-native governance
    kernel and CLI for multi-agent engineering workflows. All core governance
    capabilities included. Optional third-party development skills available
    for confirmed install only.
  required: []
  optional:
    # auto-brainstorm / auto-debug / auto-verify are RETIRED (2.7): no longer
    # auto-triggered. Brainstorm demand routes to grill-with-docs, debug to
    # diagnosing-bugs, and verification to verification-before-completion.
    # See manifests/skills-registry.yaml (route_state: retired).
    # ags-capability is also retired as a Codex front-stage command skill; the
    # public `ags capability ...` CLI remains available for Cross-Agent
    # visibility/sync and is not exposed as a `$ags-capability` skill.
    # ── Manual skills (external recommendation-only sources; never auto-installed) ──
    - name: test-driven-development
      source: "https://github.com/obra/superpowers/tree/main/skills/test-driven-development"
      version: "latest"
      description: "Test-driven development workflow (red-green-refactor)"
    - name: diagnosing-bugs
      source: "https://github.com/mattpocock/skills/tree/main/skills/engineering/diagnosing-bugs"
      version: "latest"
      description: "Root cause diagnosis with evidence chain"
    - name: grill-with-docs
      source: "https://github.com/mattpocock/skills/tree/main/skills/engineering/grill-with-docs"
      version: "latest"
      description: "Requirements alignment grounded in project docs"
    - name: prototype
      source: "https://github.com/mattpocock/skills/tree/main/skills/engineering/prototype"
      version: "latest"
      description: "Throwaway prototype workflow for uncertain designs"
    - name: superpowers
      source: "https://github.com/obra/superpowers"
      version: "latest"
      description: "Bundled engineering playbook dependency"
    - name: webapp-testing
      source: "https://github.com/anthropics/skills/tree/main/webapp-testing"
      version: "latest"
      description: "Playwright-based web application testing"
  personal: {}
