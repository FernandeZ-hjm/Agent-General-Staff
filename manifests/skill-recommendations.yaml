# AGS Public Edition — Third-Party Skill Recommendations
#
# This manifest is the SINGLE public recommendation source consumed by
# `ags setup` (the third-party core capability recommendation block) and by
# docs/skill-recommendations.md.
#
# RECOMMENDATION-ONLY. Every entry here is an *external* recommendation:
#   - AGS never clones, installs, downloads, copies, or packages these bodies.
#   - AGS never writes host config or a skill thin-index for them.
#   - `recommendation_only: true` + `source_kind: external` means the upstream
#     URL is a pointer for manual install — it is NOT an AGS-locally-hosted
#     canonical skill body. Only a real local `SKILL.md` under an AGS canonical
#     store ever participates in thin-index writes (see capability/skill sync).
#
# Names are UPSTREAM canonical names. No local aliases. Intentionally excluded:
#   - obsidian-vault  (user-personal skill; never a public core recommendation)
#   - teach           (not recommended)
# Retired local aliases were removed with no compatibility rows; upstream
# canonical names are used throughout. See RELEASE_NOTES.md for the rename map.
#
# Schema version: 1.1-public

schema_version: "1.1-public"
generated: "2026-06-22"
principle: >
  Third-party skills enhance the full development experience but are NEVER
  installed by AGS. Each entry is an external recommendation with a manual
  install path. recommendation_only/external sources are pointers, not
  AGS-hosted bodies; AGS will never clone repositories, run external install
  commands, write host config, or write skill thin-indexes for them.

# Excluded by policy (documented so reviewers can see the intent, NOT recommended):
excluded:
  - id: obsidian-vault
    reason: User-personal skill; never enters the public third-party core recommendation set.
  - id: teach
    reason: Not recommended for the public core development surface.

