    install_location: $HOME/.agents/skills/superpowers/
    manual_steps:
      - "Review https://github.com/obra/superpowers and its MIT license"
      - "mkdir -p ~/.agents/skills/superpowers"
      - "Copy SKILL.md and playbooks/ into the directory"
    source: "https://github.com/obra/superpowers"
    license: "MIT"
    attribution: "Copyright (c) 2025 Jesse Vincent; retain upstream MIT notice when copying or adapting Superpowers material."

