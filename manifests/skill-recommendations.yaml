    license: "MIT"
    attribution: "Copyright (c) 2025 Jesse Vincent; retain upstream MIT notice when copying or adapting Superpowers material."
    risk: low
    risk_description: Read-only orchestration; no production writes.
    install_location: $HOME/.agents/skills/superpowers/
