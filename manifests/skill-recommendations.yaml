# AGS Public Edition — Third-Party Skill Recommendations
#
# This manifest lists recommended third-party development skills.
# These are RECOMMENDATIONS ONLY — no skills are auto-installed.
# Each entry documents: source, purpose, risk, install location, manual steps.
#
# Schema version: 1.0-public

schema_version: "1.0-public"
generated: "2026-06-06"
principle: >
  Third-party skills enhance the full development experience but are
  NEVER installed by default. Every skill requires explicit manual
  installation by the user. AGS will never clone repositories,
  run external install commands, or write to user skill directories.

