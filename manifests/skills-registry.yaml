candidate_skills:
  - name: git-guardrails-claude-code
    profile: candidate
    adoption_priority: high
    adoption_mode: evaluate_only
    rationale: Complements existing review gates with hard Git safety guardrails.
    source:
      type: upstream_git
      upstream: mattpocock_skills
      path: skills/misc/git-guardrails-claude-code

  - name: to-prd
    profile: candidate
    adoption_priority: medium
    adoption_mode: optional_task_card_module
    rationale: Useful for PRD shaping, but should not replace the task-card contract.
    source:
      type: upstream_git
      upstream: mattpocock_skills
      path: skills/engineering/to-prd

  - name: to-issues
    profile: candidate
    adoption_priority: medium
    adoption_mode: optional_task_card_module
    rationale: Useful for GitHub issue breakdown when a project is issue-first.
    source:
      type: upstream_git
      upstream: mattpocock_skills
      path: skills/engineering/to-issues

  - name: triage
    profile: candidate
    adoption_priority: medium
    adoption_mode: optional_task_card_module
    rationale: Useful for backlog and issue triage, not required for local task cards.
    source:
      type: upstream_git
      upstream: mattpocock_skills
      path: skills/engineering/triage

  - name: grill-me
    profile: candidate
    adoption_priority: low
    adoption_mode: evaluate_only
    rationale: Overlaps with grill-with-docs and should be compared before adoption.
    source:
      type: upstream_git
      upstream: mattpocock_skills
      path: skills/productivity/grill-me

  - name: ubiquitous-language
    profile: candidate
    adoption_priority: low
    adoption_mode: evaluate_only
    rationale: Deprecated upstream; keep as concept reference only.
    source:
      type: upstream_git
      upstream: mattpocock_skills
      path: skills/deprecated/ubiquitous-language
