  # ── host-system skill-authoring entry (adopted into the registry; NOT a suite
  #    body) ──
  # `skill-creator` is a Codex host-system (`.system`) skill discovered read-only
  # on this machine. AGS never holds, copies, or relinks its body; there is no
  # `local_path` and no machine path here (source.type: host-system). It is the
  # deliberately adopted skill-authoring entry. The three-gate rule still
  # applies: the runtime skill-tag gate independently confirms it is available for
  # the active host before any task card may invoke it. A host without the
  # host-system body fails closed; AGS never substitutes another skill.
  - name: skill-creator
    routing:
      route_state: routable
      intent_tags: [skill-authoring]
      scope_tags: ["*"]
      mutation_surface: local-write
      requires_auth: false
      cost_class: free
      invoke_hint: "[skill: skill-creator]"
      route_priority: 30
      capability_group: [skill-authoring]
      upstream_group: "host-system"
      examples:
        positive: ["创建一个新技能", "创建一个新的 Hermes skill", "create a new skill"]
        negative: ["帮我修复这个报错"]
    source:
      type: host-system
      relationship: host_discovered
      update_policy: host_managed_no_upstream

  - name: claude-mem
    profile: optional
    local_path: skill-packs/optional/claude-mem
    description: AGS wrapper for Claude-Mem persistent session memory search
