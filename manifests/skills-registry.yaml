  - name: brainstorming
    description: Conversational resolution of explicit brainstorms or unresolved system architecture
    routing:
      route_state: routable
      parent: { kind: skill, name: superpowers }
      entrypoint: { kind: playbook, name: brainstorming }
      intent_tags: [brainstorm, system-architecture]
      scope_tags: ["*"]
      mutation_surface: read-only
      requires_auth: false
      cost_class: free
      invoke_hint: "[skill: superpowers]"
      route_priority: 40
      capability_group: [engineering-process]
      upstream_group: "obra/superpowers:brainstorming"
      examples:
        positive: ["帮我 brainstorm 一个方案", "设计跨 MCP、CLI、Vault 的新架构，明确架构边界"]
        negative: ["设计一个登录功能", "按已确认方案开始实现", "解释一下什么是系统架构", "翻译 system architecture 这个术语"]
