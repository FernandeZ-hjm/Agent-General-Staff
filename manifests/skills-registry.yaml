# Skills Registry (Public Edition)
# Source-of-truth index for suite-managed skills and their upstream crawl seeds.
#
# Local suite files remain canonical. Upstreams are read-only comparison sources:
# crawl remote -> generate diff proposal -> human accepts or rejects.

registry:
  version: 1.1.0
  description: >
    Public skills registry for the Agent Governance Suite. This indexes the
    suite skill surface and records which existing skills should watch
    mattpocock/skills for future upstream changes.
  update_policy: read_only_crawl_then_diff_proposal
  upstreams:
    mattpocock_skills:
      type: git
      url: https://github.com/mattpocock/skills.git
      web: https://github.com/mattpocock/skills
      ref: main
      crawl: true
      notes: >
        Crawl as an upstream comparison source only. Do not run npx skills,
        auto-install, or overwrite local suite skills from this repository.
    superpowers:
      type: git
      url: https://github.com/obra/superpowers.git
      web: https://github.com/obra/superpowers
      ref: main
      crawl: true
      notes: >
        Crawl as an upstream comparison source only (obra/superpowers, MIT).
        Do not run npx skills, auto-install, or overwrite local suite skills
        from this repository.
    graphify:
      type: git
      url: https://github.com/safishamsi/graphify.git
      web: https://github.com/safishamsi/graphify
      package: graphifyy
      cli: graphify
      ref: v8
      crawl: true
      notes: >
        Graphify is an upstream CLI/tool dependency. The local
        graphify skill is a graph-intent wrapper and should be reviewed only
        when the CLI contract, install flow, or output structure changes.

skills:
  - name: claude-delivery-report
    profile: required
    local_path: global-skills/claude-delivery-report
    description: Claude Code delivery report template
    routing:
      route_state: routable
      invoke_hint: "[skill: claude-delivery-report]"
      mutation_surface: read-only
      route_priority: 60
    source:
      type: local
      relationship: suite_local
      update_policy: local_canonical_no_upstream

  - name: diagnosing-bugs
    profile: required
    local_path: global-skills/diagnosing-bugs
    description: Disciplined diagnosis loop for hard bugs
    routing:
      route_state: routable
      intent_tags: [debug, root-cause]
      scope_tags: ["*"]
      mutation_surface: read-only
      requires_auth: false
      cost_class: free
      invoke_hint: "[skill: diagnosing-bugs]"
      route_priority: 50
      capability_group: [engineering-process]
      upstream_group: "mattpocock/skills:diagnosing-bugs"
      examples:
        positive: ["帮我系统排查这个报错"]
        negative: ["帮我做代码审查"]
    source:
      type: upstream_git
      upstream: mattpocock_skills
      path: skills/engineering/diagnosing-bugs
      relationship: local_enriched_from_upstream
      update_policy: crawl_then_diff_proposal

  - name: codebase-design
