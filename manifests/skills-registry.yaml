# Skills Registry (Public Edition)
# Defines the schema for importable skills and serves as the source of truth
# for verify.sh skill enumeration.
#
# This file contains NO private skill content — only the registry structure
# and example entries showing how to register a skill.

registry:
  version: 1.0.0
  description: >
    Public skills registry for the Agent Governance Suite.
    Lists skills that can be imported via scripts/import-skill.sh.
    No skills are bundled — import them on demand.

# --- Schema ---
# Each skill entry:
#   name:        Skill directory name (must match global-skills/<name>)
#   description: One-line summary
#   source:      Where to obtain the skill
#     type:      git | local | archive
#     url:       git URL, local path, or archive URL
#   required_by: List of skills/features that depend on this one (optional)
#   auto_trigger: true if this skill triggers automatically (optional)

skills:
