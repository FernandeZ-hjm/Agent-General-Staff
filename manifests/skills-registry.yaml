# Skills Registry (Private Edition)
# Source-of-truth index for skill routing, body ownership, and upstream crawl seeds.
#
# Suite-owned files and declared external-manager bodies keep separate canonical
# ownership. Upstreams remain read-only comparison sources: crawl remote ->
# generate diff proposal -> human accepts or rejects.
# `route_priority`, examples, and demand_routes remain 0.2.x compatibility
# metadata only. The 0.3.0 resolver never consumes them as selection authority;
# hosts choose exact SkillTargets from the thin SkillCard catalog.

registry:
  version: 1.2.0
  description: >
    Private skills registry for the Agent Governance Suite. This indexes the
    required global skills and records which existing skills should watch
    upstream skill repositories for future changes.
  update_policy: read_only_crawl_then_diff_proposal
  upstreams:
    mattpocock_skills:
      type: git
      url: https://github.com/mattpocock/skills.git
      web: https://github.com/mattpocock/skills
      ref: main
      crawl: true
      notes: >
        Crawl as an upstream comparison source only. Do not run npx skills,
        auto-install, or overwrite local suite skills from this repository.
    superpowers:
      type: git
      url: https://github.com/obra/superpowers.git
      web: https://github.com/obra/superpowers
      ref: main
      crawl: true
      notes: >
        Crawl as an upstream comparison source only. AGS bundles the reviewed
        playbooks beneath one suite-owned Superpowers parent; upstream names
        remain internal route-target entrypoints rather than standalone host
        bodies.
    graphify:
      type: git
      url: https://github.com/safishamsi/graphify.git
      web: https://github.com/safishamsi/graphify
      package: graphifyy
      cli: graphify
      ref: v8
      crawl: true
      notes: >
        Graphify is an upstream CLI/tool dependency. The local
        graphify skill is a graph-intent wrapper and should be reviewed only
        when the CLI contract, install flow, or output structure changes.

