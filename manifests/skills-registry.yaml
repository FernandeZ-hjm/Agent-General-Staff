      upstream: graphify
      relationship: wrapper_around_upstream_tool
      update_policy: monitor_tool_release_and_wrapper_contract

  - name: superpowers
    profile: required
    description: Single host-visible router for bundled Superpowers engineering playbooks
    routing:
      route_state: routable
      invoke_hint: "[skill: superpowers]"
      capability_group: [engineering-process]
      upstream_group: "obra/superpowers"
    source:
      type: host-system
      upstream: superpowers
      relationship: registry_adopted_host_body
      update_policy: crawl_then_diff_proposal

  # ags-capability retired from the front-stage command-skill set (2.7): the
  # `ags capability ...` CLI and Cross-Agent sync engine remain, but the
  # host-visible `ags-capability` command skill is no longer installed. The row
  # is retained as a history-preserve resurrection guard; public edition ships
  # no canonical skill body for it.
  - name: ags-capability
    description: Retired Codex front-stage command skill for the capability CLI
    routing:
      route_state: retired
      intent_tags: []
    source:
      type: local
      relationship: retired_history_record
      update_policy: none_retired

route_targets:
  # Superpowers playbooks are internal entrypoints of one real host-visible body.
  # Task cards tag only `[skill: superpowers]` and name a playbook in task prose.
  # Playbooks inherit availability from `superpowers`, never create host-visible
  # install expectations, and never produce thin-index writes of their own.
  - name: test-driven-development
    description: Superpowers test-driven-development playbook
    routing:
      route_state: routable
      parent: { kind: skill, name: superpowers }
      entrypoint: { kind: playbook, name: test-driven-development }
      intent_tags: [tdd, test-first]
      scope_tags: ["*"]
      mutation_surface: local-write
      requires_auth: false
      cost_class: free
      invoke_hint: "[skill: superpowers]"
      route_priority: 45
      capability_group: [engineering-process, verification]
      upstream_group: "obra/superpowers:test-driven-development"
  - name: verification-before-completion
    description: Superpowers verification-before-completion playbook (verify route target)
    routing:
      route_state: routable
      parent: { kind: skill, name: superpowers }
      entrypoint: { kind: playbook, name: verification-before-completion }
      intent_tags: [verify]
      scope_tags: ["*"]
      mutation_surface: read-only
      requires_auth: false
      cost_class: free
      invoke_hint: "[skill: superpowers]"
      route_priority: 50
      is_compatibility_alias: false
      capability_group: [engineering-process, verification]
      upstream_group: "obra/superpowers"
      examples:
        positive: ["做完了验证一下", "验证一下"]
        negative: ["帮我修复这个报错"]

  - name: systematic-debugging
    description: Superpowers systematic-debugging playbook (secondary debug method hint)
    routing:
      route_state: routable
      parent: { kind: skill, name: superpowers }
      entrypoint: { kind: playbook, name: systematic-debugging }
      intent_tags: [debug]
      scope_tags: ["*"]
      mutation_surface: read-only
      requires_auth: false
      cost_class: free
      invoke_hint: "[skill: superpowers]"
      route_priority: 70
      is_compatibility_alias: false
      capability_group: [engineering-process]
      upstream_group: "obra/superpowers"
      examples:
        positive: ["帮我系统排查这个报错"]
        negative: ["帮我做代码审查"]

  - name: brainstorming
    description: Superpowers brainstorming playbook (secondary brainstorm method hint)
    routing:
      route_state: routable
      parent: { kind: skill, name: superpowers }
      entrypoint: { kind: playbook, name: brainstorming }
      intent_tags: [brainstorm]
      scope_tags: ["*"]
      mutation_surface: read-only
      requires_auth: false
      cost_class: free
      invoke_hint: "[skill: superpowers]"
      route_priority: 70
      is_compatibility_alias: false
      capability_group: [engineering-process]
      upstream_group: "obra/superpowers"
      examples:
        positive: ["帮我 brainstorm 一个方案"]
        negative: ["帮我修复这个报错"]

candidate_skills:
