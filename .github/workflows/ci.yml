name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      # RUSTFLAGS set via env (not inline) so it works on the Windows PowerShell shell too.
      - name: Test
        run: cargo test --all
        env:
          RUSTFLAGS: "-D warnings"

      - name: Build release
        run: cargo build --release

      # Rust-native local verify — canonical cross-platform gate. Windows and macOS
      # run this Rust entry (NOT the Bash verify.sh) so portability is exercised off Linux.
      # Invoke the already-built release binary directly: on Windows, launching verify
      # through `cargo run` keeps target/debug/ags.exe locked while verify invokes Cargo.
      - name: Verify (Rust-native local)
        run: ./target/release/ags verify --scope local --format text

      # Supply-chain gate (repo-local deny.toml) + full Bash verify — Ubuntu only.
      - name: Install cargo-deny
        if: matrix.os == 'ubuntu-latest'
        run: |
          if command -v cargo-deny >/dev/null 2>&1; then
            cargo deny --version
          else
            cargo install cargo-deny --locked
          fi

      - name: Supply-chain + full verify (Bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/verify.sh
