# Skill Adoption Log
# Auto-generated by govern-new-skills.sh adopt.
# Records each skill adoption with source, hash, safety findings, and decision.
# Do not delete entries — append-only. To revert, un-adopt and add a new rollback entry.
#
# Schema (per entry):
#   - timestamp: "<ISO8601>"
#     skill: "<name>"
#     source: "<path|URL>"
#     source_type: directory|git|file
#     profile: required|optional|personal
#     destination: "<abs-path>"
#     file_count: <int>
#     content_hash: "<sha256>"
#     safety_findings: "<summary>"
#     decision: adopted|skipped
#     operator: "<$USER>"
